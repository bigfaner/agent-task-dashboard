{{define "landing.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <header>
        <h1>{{.Title}}</h1>
    </header>
    <main>
        <div id="project-cards" class="project-cards-container">
            {{range .Projects}}
            <a href="/projects/{{.ID}}" class="project-card">
                <h3>{{.Name}}</h3>
                <p>Features: {{.FeatureCount}}</p>
                <p>Tasks: {{.CompletedTasks}}/{{.TotalTasks}}</p>
                <progress value="{{.CompletionPct}}" max="100"></progress>
                <span class="health-status">{{.HealthStatus}}</span>
            </a>
            {{else}}
            <p>No projects found.</p>
            {{end}}
        </div>
    </main>

    <script id="__INITIAL_DATA__" type="application/json">{{.Projects | toJson}}</script>
    <script src="/static/js/landing.js"></script>
</body>
</html>
{{end}}
