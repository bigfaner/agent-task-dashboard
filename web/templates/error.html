{{define "error.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <header>
        <h1>{{.Title}}</h1>
    </header>
    <main>
        <div class="error-page">
            <h2>{{.StatusCode}}</h2>
            <p>{{.ErrorMessage}}</p>
            <a href="/">Back to Dashboard</a>
        </div>
    </main>
</body>
</html>
{{end}}
